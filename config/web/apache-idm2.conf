<VirtualHost *:8443>
    ServerName web.fis.epn.ec
    DocumentRoot /var/www/miniidm

    SSLEngine on
    SSLCertificateFile /etc/apache2/tls/web-server.cert.pem
    SSLCertificateKeyFile /etc/apache2/tls/web-server.key.pem
    SSLCACertificateFile /etc/apache2/tls/ca.cert.pem

    Header always set X-MiniIdM-Node "idm2"
    Header always set X-MiniIdM-Auth "Kerberos-GSSAPI"

    <Directory /var/www/miniidm>
        Options -Indexes
        AllowOverride None
        Require all granted
    </Directory>

    <Location />
        AuthType GSSAPI
        AuthName "MiniIdM Kerberos"
        GssapiCredStore keytab:/etc/apache2/http-web.keytab
        GssapiLocalName On
        Require valid-user
    </Location>

    ErrorLog ${APACHE_LOG_DIR}/miniidm-web-error.log
    CustomLog ${APACHE_LOG_DIR}/miniidm-web-access.log combined
</VirtualHost>
